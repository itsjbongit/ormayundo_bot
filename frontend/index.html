<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ormayundo | Welcome</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-900 font-sans antialiased text-slate-100 min-h-screen flex flex-col justify-between">

    <nav class="border-b border-slate-800 bg-slate-950/50 backdrop-blur-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa-solid fa-robot text-indigo-500 text-2xl"></i>
                <span class="font-bold text-xl tracking-tight text-white">Ormayundo</span>
            </div>
            <button onclick="toggleLoginModal(true)" class="bg-slate-800 hover:bg-slate-700 text-slate-200 px-4 py-2 rounded-lg text-sm font-medium transition-colors border border-slate-700">
                Admin Portal
            </button>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 text-center py-24 flex-grow flex flex-col justify-center items-center">
        <h1 class="text-5xl md:text-6xl font-extrabold tracking-tight mb-6 bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
            Your Memory, Automated.
        </h1>
        <p class="text-xl text-slate-400 max-w-2xl mb-10 leading-relaxed">
            The smartest Telegram bot for managing your daily reminders, tasks, and schedules. Never let a critical deadline slip away again.
        </p>
        <a href="https://t.me/ormayundov1_bot" target="_blank" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 px-10 rounded-full shadow-lg shadow-indigo-500/20 transition-transform transform hover:-translate-y-1 inline-flex items-center gap-3 text-lg">
            <i class="fa-brands fa-telegram text-2xl"></i> Launch in Telegram
        </a>
    </main>

    <footer class="border-t border-slate-800 py-6 text-center text-sm text-slate-500">
        &copy; 2026 Ormayundo Bot. All rights reserved.
    </footer>

    <div id="loginModal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-800 rounded-2xl w-full max-w-md p-8 shadow-2xl relative">
            <button onclick="toggleLoginModal(false)" class="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            <div class="text-center mb-6">
                <i class="fa-solid fa-lock text-indigo-500 text-3xl mb-2"></i>
                <h3 class="text-xl font-bold text-white">Admin Authentication</h3>
                <p class="text-slate-400 text-sm mt-1">Access restricted to admin</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Email Address</label>
                    <input type="email" id="email" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-1">Password</label>
                    <input type="password" id="password" required class="w-full bg-slate-950 border border-slate-800 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-indigo-500 text-sm">
                </div>
                <div id="errorMessage" class="text-red-400 text-xs hidden bg-red-500/10 border border-red-500/20 p-2.5 rounded-lg"></div>
                <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-2.5 rounded-lg text-sm transition-colors flex justify-center items-center gap-2">
                    <i class="fa-solid fa-sign-in-alt"></i> Verify Identity
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // ⚠️ REPLACE THIS WITH YOUR EXACT WEB APP CONFIG FROM FIREBASE CONSOLE
        const firebaseConfig = {
            apiKey: "AIzaSyBZT30rctjtPEBAjrkOQpF1cxRszcV2Dp0",
            authDomain: "ormayundobot.firebaseapp.com",
            projectId: "ormayundobot",
            storageBucket: "ormayundobot.firebasestorage.app",
            messagingSenderId: "900848756830",
            appId: "1:900848756830:web:9428dd5a308fe49e0beccf"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Handle Form Submission
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errDiv = document.getElementById('errorMessage');
            errDiv.classList.add('hidden');

            try {
                // Log into Firebase
                await signInWithEmailAndPassword(auth, email, password);
                // Redirect within the SAME TAB to the protected dashboard
                window.location.href = 'dashboard.html';
            } catch (error) {
                errDiv.innerText = "Invalid credentials. Access denied.";
                errDiv.classList.remove('hidden');
            }
        });
    </script>

    <script>
        function toggleLoginModal(show) {
            const modal = document.getElementById('loginModal');
            if (show) modal.classList.remove('hidden');
            else modal.classList.add('hidden');
        }
    </script>
</body>
</html>
